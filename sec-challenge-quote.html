<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposal — Social Emotional Challenge · Eureka Websites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fraunces:ital,wght@0,300;0,600;1,300&family=Concert+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }

    :root {
      --bg:       #f7fafd;
      --surface:  #ffffff;
      --border:   #dde8f2;
      --blue:     #5bc8d8;      /* from logo text */
      --blue-dk:  #3aa8ba;
      --blue-lt:  #d4f3f8;
      --coral:    #f4846e;      /* from parrot / tagline */
      --coral-lt: #fde8e4;
      --navy:     #1e3044;      /* dark outline colour in logo */
      --text:     #1e3044;
      --muted:    #5b7080;
      --dim:      #7a90a0;
      --green:    #3cc98a;
      --red:      #f47070;
      --sans:     'Nunito', system-ui, sans-serif;
      --serif:    'Fraunces', Georgia, serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .topbar-brand {
      font-family: 'Concert One', sans-serif;
      font-size: 1.1rem;
      color: #9fecf4;
      letter-spacing: 0.04em;
      text-shadow: 1px 1px 0 #1e3044;
      background: var(--navy);
      padding: 4px 12px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .btn-print { display: none; }

    /* ── HERO ── */
    .hero {
      background: var(--navy);
      padding: 64px 24px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(91,200,216,0.18) 0%, transparent 60%),
                  radial-gradient(ellipse at 30% 80%, rgba(244,132,110,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-inner { position: relative; z-index: 1; }

    .hero-badge {
      display: inline-block;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blue);
      border: 1.5px solid rgba(91,200,216,0.5);
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 22px;
      font-weight: 700;
    }

    .hero h1 {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: #ffffff;
      margin-bottom: 10px;
      line-height: 1.15;
    }

    .hero-sub {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--coral);
      margin-bottom: 40px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px 40px;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .hero-meta span strong {
      display: block;
      font-size: 0.92rem;
      text-transform: none;
      letter-spacing: 0;
      color: rgba(255,255,255,0.9);
      font-weight: 600;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 0 24px;
    }

    section {
      padding: 56px 0 0;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--coral);
      margin-bottom: 8px;
      font-weight: 800;
    }

    h2 {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 2rem;
      color: var(--navy);
      margin-bottom: 24px;
    }

    hr.divider {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 48px 0 0;
    }

    /* ── INTRO CARD ── */
    .intro-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.85;
    }

    /* ── ROLES ── */
    .roles-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 680px) {
      .roles-grid { grid-template-columns: 1fr; }
    }

    .role-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 24px 22px;
    }

    .role-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .role-card h3 {
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .role-card p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .role-card ul { margin-top: 12px; }

    .role-card ul li {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 4px 0;
      padding-left: 16px;
      position: relative;
    }

    .role-card ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--blue);
      font-size: 0.72rem;
    }

    /* ── SCOPE ── */
    .scope-block {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .scope-block-header {
      background: var(--blue-lt);
      border-bottom: 1.5px solid var(--border);
      padding: 13px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .scope-block-header h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--navy);
    }

    .scope-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.86rem;
    }
    .scope-row:last-child { border-bottom: none; }

    .scope-row-label {
      flex: 1;
      color: var(--text);
    }

    .scope-row-label small {
      display: block;
      font-size: 0.78rem;
      color: var(--dim);
      margin-top: 1px;
    }

    .scope-checks {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      flex-shrink: 0;
    }

    .scope-check-col {
      width: 36px;
      display: flex;
      justify-content: center;
    }

    .scope-col-headers {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .scope-col-headers-inner {
      display: flex;
      gap: 8px;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .scope-col-headers-inner span {
      width: 36px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .scope-check-col { width: 30px; }
      .scope-col-headers-inner span { width: 30px; font-size: 0.6rem; }
      .scope-checks { gap: 4px; }
      .scope-row { padding: 10px 12px; }
      .scope-block-header { padding: 12px; }
      .topbar { padding: 12px 16px; }
      .container { padding: 0 14px; }

      /* costs table: hide free tier column, tighten */
      .costs-table .col-hide { display: none; }
      .costs-table th, .costs-table td { padding: 10px 8px; font-size: 0.82rem; }
      .costs-table .col-cost { font-size: 0.9rem; }
    }

    .check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 700;
      margin-top: 1px;
    }

    .check.yes { background: #d4f4e6; color: var(--green); }
    .check.no  { background: #fde8e4; color: var(--red); }

    /* ── NOT INCLUDED ── */
    .not-included {
      background: #fff8f7;
      border: 1.5px solid #f4c4bb;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .not-included h3 {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--coral);
      margin-bottom: 12px;
      font-weight: 800;
    }

    .not-included ul li {
      font-size: 0.86rem;
      color: var(--muted);
      padding: 4px 0;
      padding-left: 18px;
      position: relative;
    }

    .not-included ul li::before {
      content: '✕';
      position: absolute;
      left: 0;
      color: var(--coral);
      font-size: 0.68rem;
    }

    /* ── TIERS ── */
    .tiers-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 720px) {
      .tiers-grid { grid-template-columns: 1fr; }
    }

    .tier-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .tier-card.recommended {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px var(--blue), 0 4px 24px rgba(91,200,216,0.18);
    }

    .tier-recommended-badge {
      background: var(--blue);
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      padding: 6px;
      font-weight: 800;
    }

    .tier-header {
      padding: 24px 22px 18px;
    }

    .tier-name {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .tier-price {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 600;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 6px;
    }

    .tier-price-note {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .tier-divider { border: none; border-top: 1.5px solid var(--border); }

    .tier-body {
      padding: 16px 22px 22px;
    }

    .tier-body ul li {
      font-size: 0.84rem;
      color: var(--muted);
      padding: 5px 0;
      padding-left: 20px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .tier-body ul li:last-child { border-bottom: none; }

    .tier-body ul li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--green);
      font-size: 0.75rem;
      font-weight: 800;
    }

    .tier-body ul li.excluded {
      opacity: 0.35;
    }
    .tier-body ul li.excluded::before {
      content: '—';
      color: var(--dim);
    }

    /* ── COSTS TABLE ── */
    .costs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .costs-table th {
      text-align: left;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 14px;
      border-bottom: 2px solid var(--border);
      font-weight: 700;
    }

    .costs-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      vertical-align: top;
    }

    .costs-table tr:last-child td { border-bottom: none; }

    .costs-table .col-cost {
      text-align: right;
      font-family: var(--serif);
      font-size: 1rem;
      color: var(--navy);
      white-space: nowrap;
      font-weight: 600;
    }

    .costs-table .row-total td {
      background: var(--blue-lt);
      font-weight: 700;
      color: var(--navy);
      border-top: 2px solid var(--border);
    }

    .costs-table .row-total .col-cost {
      color: var(--blue-dk);
    }

    /* ── TIMELINE ── */
    .timeline {
      position: relative;
      padding-left: 24px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 6px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      background: var(--blue-lt);
      border-radius: 2px;
    }

    .timeline-item {
      position: relative;
      padding-bottom: 28px;
    }
    .timeline-item:last-child { padding-bottom: 0; }

    .timeline-dot {
      position: absolute;
      left: -20px;
      top: 6px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--blue);
      border: 3px solid var(--bg);
    }

    .timeline-week {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue-dk);
      font-weight: 800;
      margin-bottom: 3px;
    }

    .timeline-title {
      font-weight: 700;
      color: var(--navy);
      font-size: 0.92rem;
      margin-bottom: 3px;
    }

    .timeline-desc {
      font-size: 0.84rem;
      color: var(--muted);
    }

    /* ── TERMS ── */
    .terms-list li {
      font-size: 0.86rem;
      color: var(--muted);
      padding: 9px 0;
      padding-left: 20px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .terms-list li:last-child { border-bottom: none; }
    .terms-list li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--blue);
      font-weight: 700;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      padding: 48px 24px 32px;
      margin-top: 72px;
    }

    .footer-inner {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px 48px;
    }

    @media (max-width: 580px) {
      .footer-inner { grid-template-columns: 1fr; }
    }

    footer h4 {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 12px;
      font-weight: 800;
    }

    footer p, footer li {
      font-size: 0.84rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }

    .footer-bottom {
      max-width: 920px;
      margin: 32px auto 0;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-brand {
      font-family: 'Concert One', sans-serif;
      font-size: 1.15rem;
      color: #9fecf4;
      letter-spacing: 0.04em;
    }

    .footer-contact {
      font-size: 0.82rem;
      color: var(--coral);
      font-weight: 600;
    }

    /* ── PRINT ── */
    @media print {
      .topbar { position: static; }
      .btn-print { display: none; }
      body { background: #fff; }
    }
  </style>
</head>
<body>

  <!-- ── Top bar ── -->
  <div class="topbar">
    <a href="https://www.eurekawebsites.tech" target="_blank" class="topbar-brand">EUREKA WEBSITES</a>
    <button class="btn-print" onclick="window.print()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 6 2 18 2 18 9"/>

  <!-- ── Hero ── -->
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-badge">Software Proposal</div>
      <h1>Social Emotional Challenge</h1>
      <p class="hero-sub">School-Based Web Application</p>
      <div class="hero-meta">

  </div>


  <!-- ════════════════════════════════════════════════════════
       PROPOSAL DATA  —  update this object per client
  ════════════════════════════════════════════════════════════ -->
  <script>
  const PROPOSAL = {
    ref:         'EW-SEC-2026-001',
    client:      'David Paris',
    valid_until: 'July 1, 2026',

    intro: `Thank you for the opportunity to put this together. Based on our conversation, you're looking for a school-based Social Emotional Challenge (SEC) web platform — a place where teachers and administrators can assign challenges to individual students, track their progress, and send reminders, all from a clean dashboard. This proposal covers what we'll build and what's included in each pricing tier.`,

    roles: [
      {
        name: 'Student',
        color: '#5bc8d8',
        icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`,
        summary: 'Receives challenges, submits responses, and tracks personal progress.',

          'Join a class with a simple class code — no password required',

          'View their own progress streak and completion history',
          'Get notified when a new challenge is available',
        ],
      },
      {
        name: 'Teacher',
        color: '#f4846e',
        icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>`,
        summary: 'Assigns challenges to their class and monitors participation.',
        abilities: [
          'Create and manage their classroom roster',
          'Browse the challenge library and assign to their class',

          'See which students have responded and who hasn\'t',
          'Send manual reminders to students who are behind',
          'Export class participation reports',
        ],
      },
      {
        name: 'School Admin',
        color: '#3cc98a',
        icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
        summary: 'Manages all teachers, classrooms, and the school\'s challenge library.',
        abilities: [
          'Create and manage teacher accounts',
          'Build and maintain the school\'s challenge library',
          'Assign challenges school-wide or to specific teachers',
          'View participation data across all classrooms',
          'Download school-wide progress reports',
          'Manage school branding (logo, name)',
        ],
      },
    ],

    scope_groups: [
      {
        title: 'Authentication & Accounts',
        icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
        items: [
          { feature: 'Admin & Teacher email/password login',              t1: true,  t2: true,  t3: true  },
          { feature: 'Student login via class code (no account needed)',  t1: true,  t2: true,  t3: true  },
          { feature: 'Role-based access (Student, Teacher, Admin)',       t1: true,  t2: true,  t3: true  },
          { feature: 'Student personal accounts (persistent login)',      t1: true,  t2: true,  t3: true,  note: 'Lets students see their full history across school years' },
          { feature: 'Single Sign-On — Google or Microsoft login',        t1: false, t2: false, t3: true  },
        ],
      },
      {
        title: 'Challenge Engine',
        icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
        items: [
          { feature: 'Pre-built challenge library',                   t1: true,  t2: true,  t3: true  },
          { feature: 'Admin can create custom challenges',                t1: true,  t2: true,  t3: true  },
          { feature: 'Teacher can assign challenges to their class',      t1: true,  t2: true,  t3: true  },
          { feature: 'Response types: text, emoji rating, multiple choice', t1: true, t2: true, t3: true  },
          { feature: 'Recurring challenge scheduling (daily / weekly)',   t1: true,  t2: true,  t3: true  },
          { feature: 'Teacher can create their own custom challenges',    t1: true,  t2: true,  t3: true  },
          { feature: 'Challenge categories and tagging',                  t1: false, t2: true,  t3: true  },
          { feature: 'School-wide challenge broadcast to all classes',    t1: false, t2: true,  t3: true  },
        ],
      },
      {
        title: 'Student Experience',
        icon: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
